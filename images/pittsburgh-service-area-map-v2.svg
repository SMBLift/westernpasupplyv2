  <circle cx="330" cy="410" r="2.5" fill="#2F5733" opacity="0.5"/>
  <text x="330" y="423" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#1E3B22" opacity="0.55" font-weight="500">Washington</text>

  <circle cx="470" cy="400" r="2.5" fill="#2F5733" opacity="0.5"/>
  <text x="470" y="415" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#1E3B22" opacity="0.55" font-weight="500">Greensburg</text>

