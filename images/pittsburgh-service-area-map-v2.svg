  <circle cx="385" cy="345" r="10" fill="none" stroke="#2F5733" stroke-width="1.5" opacity="0.4"/>
  <circle cx="385" cy="345" r="16" fill="none" stroke="#2F5733" stroke-width="0.8" opacity="0.15"/>
